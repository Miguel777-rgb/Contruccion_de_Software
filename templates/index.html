<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task & User Manager </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-tasks"></i> Task & User Manager</h1>
            <p>Simple Frontend para probar la API</p>
        </div>

        <div class="content">
            <!-- TASKS SECTION -->
            <div class="section">
                <h2><i class="fas fa-list-check"></i> Tareas</h2>

                <div id="tasksMessage" class="message"></div>

                <div class="form-group">
                    <label for="taskUserId">Usuario:</label>
                    <select id="taskUserId">
                        <option value="">-- Seleccionar Usuario --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="taskContent">Contenido de la tarea:</label>
                    <textarea id="taskContent" placeholder="Describe tu tarea..."></textarea>
                </div>

                <button onclick="createTask()" class="btn-success"><i class="fas fa-plus"></i> Crear Tarea</button>
                <button onclick="toggleTasksList()" class="btn-warning"><i class="fas fa-eye-slash" id="taskToggleIcon"></i> <span id="taskToggleText">Ocultar</span></button>

                <div class="list" id="tasksList" style="display: block;">
                    <div class="empty-state">Cargando tareas...</div>
                </div>
            </div>

            <!-- USERS SECTION -->
            <div class="section">
                <h2><i class="fas fa-users"></i> Usuarios</h2>

                <div id="usersMessage" class="message"></div>

                <div class="form-group">
                    <label for="userName">Nombre:</label>
                    <input type="text" id="userName" placeholder="Ej: Juan">
                </div>

                <div class="form-group">
                    <label for="userLastname">Apellido:</label>
                    <input type="text" id="userLastname" placeholder="Ej: Pérez">
                </div>

                <div class="form-group">
                    <label for="userCity">Ciudad:</label>
                    <input type="text" id="userCity" placeholder="Ej: Madrid">
                </div>

                <div class="form-group">
                    <label for="userCountry">País:</label>
                    <input type="text" id="userCountry" placeholder="Ej: España">
                </div>

                <div class="form-group">
                    <label for="userPostalCode">Código Postal:</label>
                    <input type="text" id="userPostalCode" placeholder="Ej: 28001 (5 dígitos)">
                </div>

                <button onclick="createUser()" class="btn-success"><i class="fas fa-plus"></i> Crear Usuario</button>
                <button onclick="toggleUsersList()" class="btn-warning"><i class="fas fa-eye-slash" id="userToggleIcon"></i> <span id="userToggleText">Ocultar</span></button>

                <div class="list" id="usersList" style="display: block;">
                    <div class="empty-state">Cargando usuarios...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para editar tarea -->
    <div id="editTaskModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditTaskModal()">&times;</span>
            <h2><i class="fas fa-edit"></i> Editar Tarea</h2>
            <div class="form-group">
                <label for="editTaskUserId">Encargado:</label>
                <select id="editTaskUserId">
                    <option value="">-- Seleccionar Usuario --</option>
                </select>
            </div>
            <div class="form-group">
                <label for="editTaskContent">Contenido:</label>
                <textarea id="editTaskContent" placeholder="Describe la tarea..."></textarea>
            </div>
            <div class="form-group">
                <label for="editTaskDone">Estado:</label>
                <select id="editTaskDone">
                    <option value="false">Pendiente</option>
                    <option value="true">Completada</option>
                </select>
            </div>
            <button onclick="saveEditTask()" class="btn-success"><i class="fas fa-save"></i> Guardar</button>
            <button onclick="closeEditTaskModal()" class="btn-warning"><i class="fas fa-times"></i> Cancelar</button>
        </div>
    </div>

    <!-- Modal para editar usuario -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditUserModal()">&times;</span>
            <h2><i class="fas fa-edit"></i> Editar Usuario</h2>
            <div class="form-group">
                <label for="editUserName">Nombre:</label>
                <input type="text" id="editUserName" placeholder="Nombre">
            </div>
            <div class="form-group">
                <label for="editUserLastname">Apellido:</label>
                <input type="text" id="editUserLastname" placeholder="Apellido">
            </div>
            <div class="form-group">
                <label for="editUserCity">Ciudad:</label>
                <input type="text" id="editUserCity" placeholder="Ciudad">
            </div>
            <div class="form-group">
                <label for="editUserCountry">País:</label>
                <input type="text" id="editUserCountry" placeholder="País">
            </div>
            <div class="form-group">
                <label for="editUserPostalCode">Código Postal:</label>
                <input type="text" id="editUserPostalCode" placeholder="5 dígitos">
            </div>
            <button onclick="saveEditUser()" class="btn-success"><i class="fas fa-save"></i> Guardar</button>
            <button onclick="closeEditUserModal()" class="btn-warning"><i class="fas fa-times"></i> Cancelar</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
